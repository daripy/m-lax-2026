<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="11" fill="#1e3a28"/>

  <!-- Stick handle — diagonal shaft -->
  <line x1="10" y1="56" x2="34" y2="14" stroke="#a8d5b5" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Head frame — teardrop loop at top of shaft -->
  <path d="M 34 14
           C 34 14, 30 5, 37 3
           C 44 1, 52 7, 51 15
           C 50 22, 43 26, 37 21
           C 33 18, 33 16, 34 14 Z"
        fill="rgba(46,204,113,0.15)"
        stroke="#2ecc71"
        stroke-width="2.5"
        stroke-linejoin="round"/>

  <!-- Mesh cross-strings inside head -->
  <line x1="35" y1="12" x2="49" y2="18" stroke="#2ecc71" stroke-width="1.2" opacity="0.55"/>
  <line x1="34" y1="18" x2="50" y2="20" stroke="#2ecc71" stroke-width="1.2" opacity="0.55"/>
  <line x1="42" y1="4"  x2="40" y2="24" stroke="#2ecc71" stroke-width="1.2" opacity="0.45"/>

  <!-- Ball sitting in pocket -->
  <circle cx="43" cy="13" r="7" fill="#e8b420"/>
  <circle cx="43" cy="13" r="7" fill="none" stroke="#c9960e" stroke-width="1"/>
  <!-- Ball seam -->
  <path d="M 40 9 Q 44 13, 40 17" fill="none" stroke="#c9960e" stroke-width="0.8" opacity="0.7"/>
</svg>
